<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Exchange JSON to CSV Converter</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2a 100%);
    color: #00ff00;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

h1 {
    color: #00ff00;
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
}

.subtitle {
    color: #00ffff;
    font-size: 1.1em;
}

.exchange-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.exchange-box {
    background: #1a1a2a;
    border: 2px solid #00ff00;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
    transition: all 0.3s;
}

.exchange-box:hover {
    box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
    border-color: #00ffff;
}

.exchange-icon {
    font-size: 3em;
    text-align: center;
    margin-bottom: 10px;
}

.exchange-title {
    font-size: 1.5em;
    color: #00ffff;
    margin-bottom: 15px;
    text-align: center;
    font-weight: bold;
}

input[type="file"] {
    display: none;
}

.file-label {
    display: block;
    padding: 10px 15px;
    background: #00ff00;
    color: #000;
    text-align: center;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 10px;
    transition: all 0.3s;
}

.file-label:hover {
    background: #00ffff;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
}

.file-name {
    padding: 8px;
    background: #0a0a0a;
    border: 1px solid #00ff00;
    border-radius: 4px;
    color: #00ff00;
    font-size: 0.9em;
    text-align: center;
    min-height: 30px;
    margin-bottom: 10px;
    word-break: break-all;
}

.btn-convert {
    width: 100%;
    padding: 12px;
    background: #00ff00;
    color: #000;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-convert:hover:not(:disabled) {
    background: #00ffff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
}

.btn-convert:disabled {
    background: #666;
    color: #999;
    cursor: not-allowed;
    opacity: 0.6;
}

.alert {
    padding: 15px;
    border-radius: 4px;
    margin-bottom: 20px;
    display: none;
}

.alert.show {
    display: block;
}

.alert-error {
    background: #2a1a1a;
    border: 2px solid #ff3333;
    color: #ff6666;
}

.alert-success {
    background: #1a2a1a;
    border: 2px solid #00ff00;
    color: #00ff00;
}

.results-section {
    background: #1a1a2a;
    border: 2px solid #00ff00;
    border-radius: 8px;
    padding: 20px;
    display: none;
}

.results-section.show {
    display: block;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.stat-box {
    background: #0a0a0a;
    border: 1px solid #00ff00;
    border-radius: 4px;
    padding: 15px;
    text-align: center;
}

.stat-label {
    color: #00ffff;
    font-size: 0.9em;
}

.stat-value {
    color: #ffff00;
    font-size: 1.8em;
    font-weight: bold;
    margin-top: 5px;
}

.top-chains {
    background: #0a0a0a;
    border: 1px solid #00ff00;
    border-radius: 4px;
    padding: 15px;
    margin-bottom: 20px;
}

.chain-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    color: #00ff00;
    border-bottom: 1px solid #003300;
}

.chain-item:last-child {
    border-bottom: none;
}

.chain-name {
    flex: 1;
}

.chain-count {
    color: #ffff00;
    font-weight: bold;
    min-width: 60px;
    text-align: right;
}

.preview {
    background: #000;
    color: #00ff00;
    padding: 15px;
    border: 1px solid #00ff00;
    border-radius: 4px;
    font-size: 0.85em;
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
}

.buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.btn {
    flex: 1;
    padding: 12px;
    background: #00ff00;
    color: #000;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.btn:hover {
    background: #00ffff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
}

.spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid #003300;
    border-top-color: #00ff00;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading {
    display: none;
    text-align: center;
    color: #00ffff;
    margin: 20px 0;
}

.loading.show {
    display: block;
}

@media (max-width: 768px) {
    h1 {
        font-size: 1.8em;
    }
    
    .exchange-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>🔄 Multi-Exchange JSON to CSV</h1>
    <p class="subtitle">Binance • Gate.io • MEXC</p>
</header>

<div class="container">
    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <div class="exchange-grid">
        <!-- Binance -->
        <div class="exchange-box">
            <div class="exchange-icon">💰</div>
            <div class="exchange-title">BINANCE</div>
            <label class="file-label" for="binanceFile">📁 Choose File</label>
            <input type="file" id="binanceFile" accept=".json">
            <div class="file-name" id="binanceName">No file selected</div>
            <button class="btn-convert" id="binanceBtn" data-exchange="binance">Convert</button>
        </div>

        <!-- Gate.io -->
        <div class="exchange-box">
            <div class="exchange-icon">🚪</div>
            <div class="exchange-title">GATE.IO</div>
            <label class="file-label" for="gateFile">📁 Choose File</label>
            <input type="file" id="gateFile" accept=".json">
            <div class="file-name" id="gateName">No file selected</div>
            <button class="btn-convert" id="gateBtn" data-exchange="gate">Convert</button>
        </div>

        <!-- MEXC -->
        <div class="exchange-box">
            <div class="exchange-icon">🎯</div>
            <div class="exchange-title">MEXC</div>
            <label class="file-label" for="mexcFile">📁 Choose File</label>
            <input type="file" id="mexcFile" accept=".json">
            <div class="file-name" id="mexcName">No file selected</div>
            <button class="btn-convert" id="mexcBtn" data-exchange="mexc">Convert</button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <div class="results-section" id="results">
        <h2 style="color: #00ffff; margin-bottom: 20px;">📊 Conversion Results</h2>
        
        <div class="stats-grid" id="stats"></div>

        <div class="top-chains" id="topChains"></div>

        <h3 style="color: #00ffff; margin-bottom: 10px;">📋 Preview (First 5 rows)</h3>
        <div class="preview" id="preview"></div>

        <div class="buttons">
            <button class="btn" id="downloadBtn">⬇️ Download CSV</button>
            <button class="btn" onclick="location.reload()">🔄 Convert Another</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
let csvData = null;
let currentExchange = null;

$(document).ready(function() {
    // File input handlers
    $('#binanceFile, #gateFile, #mexcFile').on('change', function() {
        const name = $(this).val().split('\\').pop() || 'No file selected';
        const prefix = $(this).attr('id').replace('File', '');
        $(`#${prefix}Name`).text(name);
    });

    // Convert buttons
    $('.btn-convert').on('click', function() {
        const exchange = $(this).data('exchange');
        const file = $(`#${exchange}File`)[0].files[0];
        
        if (!file) {
            showError(`Please select a file for ${exchange.toUpperCase()}`);
            return;
        }

        currentExchange = exchange;
        convertFile(file, exchange);
    });

    // Download button
    $('#downloadBtn').on('click', downloadCSV);
});

function showError(msg) {
    $('#errorAlert').text(msg).addClass('show');
    setTimeout(() => $('#errorAlert').removeClass('show'), 5000);
}

function showSuccess(msg) {
    $('#successAlert').text(msg).addClass('show');
    setTimeout(() => $('#successAlert').removeClass('show'), 5000);
}

function showLoading(show) {
    $('#loading')[show ? 'addClass' : 'removeClass']('show');
}

function convertFile(file, exchange) {
    showLoading(true);
    $('#errorAlert').removeClass('show');

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const jsonData = JSON.parse(e.target.result);
            if (!Array.isArray(jsonData)) throw new Error('JSON must be an array');

            csvData = processExchange(exchange, jsonData);
            displayResults();
            showSuccess(`✅ Converted ${csvData.exported} tokens`);
            $('#results').addClass('show');
        } catch (err) {
            showError('Error: ' + err.message);
        } finally {
            showLoading(false);
        }
    };
    reader.onerror = () => {
        showError('Error reading file');
        showLoading(false);
    };
    reader.readAsText(file);
}

function processExchange(exchange, data) {
    let chains = {};
    let exported = 0;
    let rows = [];

    data.forEach(token => {
        let networks = {};
        let coin = '', name = '', deposit = 'false', withdraw = 'false';

        if (exchange === 'binance') {
            coin = token.coin || '';
            name = token.name || '';
            deposit = token.depositAllEnable ? 'true' : 'false';
            withdraw = token.withdrawAllEnable ? 'true' : 'false';
            if (token.networkList) {
                token.networkList.forEach(net => {
                    const addr = net.contractAddress || '';
                    if (addr.startsWith('0x') && addr.length === 42) {
                        networks[net.network] = addr;
                    }
                });
            }
        } else if (exchange === 'gate') {
            coin = token.currency || '';
            name = token.name || '';
            deposit = !token.deposit_disabled ? 'true' : 'false';
            withdraw = !token.withdraw_disabled ? 'true' : 'false';
            if (token.chains) {
                token.chains.forEach(c => {
                    const addr = c.addr || '';
                    if (addr.startsWith('0x') && addr.length === 42) {
                        networks[c.name] = addr;
                    }
                });
            }
        } else if (exchange === 'mexc') {
            coin = token.coin || '';
            name = token.name || '';
            deposit = token.depositEnable ? 'true' : 'false';
            withdraw = token.withdrawEnable ? 'true' : 'false';
            if (token.networkList) {
                token.networkList.forEach(net => {
                    const addr = net.contract || '';
                    const chain = net.netWork || '';
                    if (chain && addr) networks[chain] = addr;
                });
            }
        }

        if (Object.keys(networks).length > 0) {
            Object.keys(networks).forEach(c => {
                chains[c] = (chains[c] || 0) + 1;
            });
            rows.push({coin, name, deposit, withdraw, networks});
            exported++;
        }
    });

    const sortedChains = Object.keys(chains).sort();
    const top10 = sortedChains
        .map(c => ({chain: c, count: chains[c]}))
        .sort((a,b) => b.count - a.count)
        .slice(0, 10);

    return {
        exchange,
        totalTokens: data.length,
        exported,
        chainCount: sortedChains.length,
        chains,
        sortedChains,
        top10,
        rows
    };
}

function displayResults() {
    // Stats
    let html = `
        <div class="stat-box">
            <div class="stat-label">Total Tokens</div>
            <div class="stat-value">${csvData.totalTokens}</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Exported</div>
            <div class="stat-value">${csvData.exported}</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Chains</div>
            <div class="stat-value">${csvData.chainCount}</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Avg per Chain</div>
            <div class="stat-value">${(csvData.exported / csvData.chainCount).toFixed(1)}</div>
        </div>
    `;
    $('#stats').html(html);

    // Top chains
    html = '<strong style="color: #00ffff;">🏆 Top 10 Chains:</strong>';
    const maxCount = Math.max(...csvData.top10.map(c => c.count));
    csvData.top10.forEach((item, i) => {
        const pct = (item.count / maxCount) * 100;
        html += `<div class="chain-item">
            <div class="chain-name">${i+1}. ${item.chain}</div>
            <div class="chain-count">${item.count}</div>
        </div>`;
    });
    $('#topChains').html(html);

    // Preview
    let preview = csvData.sortedChains.slice(0, 10).join('\t') + '\n';
    preview += '─'.repeat(80) + '\n';
    csvData.rows.slice(0, 5).forEach(r => {
        preview += r.coin + '\t' + r.name + '\t' + r.deposit + '\t' + r.withdraw + '\n';
    });
    preview += '─'.repeat(80) + '\n';
    preview += `Total ${csvData.exported} rows in export`;
    $('#preview').text(preview);
}

function downloadCSV() {
    if (!csvData) return;

    const lines = [];
    const headers = ['coin', 'name', 'depositEnable', 'withdrawEnable', ...csvData.sortedChains];
    lines.push(headers.join('\t'));

    csvData.rows.forEach(r => {
        const row = [r.coin, r.name, r.deposit, r.withdraw, ...csvData.sortedChains.map(c => r.networks[c] || '')];
        lines.push(row.join('\t'));
    });

    const counts = {};
    csvData.sortedChains.forEach(c => counts[c] = 0);
    csvData.rows.forEach(r => {
        csvData.sortedChains.forEach(c => {
            if (r.networks[c]) counts[c]++;
        });
    });

    const summary = ['[TOTAL]', 'Total coins per chain:', '', '', ...csvData.sortedChains.map(c => counts[c])];
    lines.push(summary.join('\t'));

    const csv = lines.join('\n');
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const link = $('<a>').attr('href', url).attr('download', `${currentExchange}_tokens.csv`)[0];
    link.click();
    URL.revokeObjectURL(url);
    
    showSuccess('✅ CSV downloaded!');
}
</script>

</body>
</html>
